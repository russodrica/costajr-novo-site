<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1F2126"/>
      <stop offset="60%" stop-color="#7A1421"/>
      <stop offset="100%" stop-color="#C41E3A"/>
    </linearGradient>
    <pattern id="dots" width="32" height="32" patternUnits="userSpaceOnUse">
      <circle cx="16" cy="16" r="1.2" fill="#FFFFFF" opacity="0.06"/>
    </pattern>
  </defs>
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#dots)"/>
  <!-- Vertical accent line -->
  <rect x="80" y="80" width="6" height="470" fill="#C41E3A"/>
  <!-- Brand mark (squares) -->
  <g transform="translate(110, 80)">
    <rect x="0" y="0" width="22" height="22" fill="#C41E3A"/>
    <rect x="28" y="0" width="22" height="22" fill="#FFFFFF" opacity="0.85"/>
    <rect x="0" y="28" width="22" height="22" fill="#FFFFFF" opacity="0.55"/>
    <rect x="28" y="28" width="22" height="22" fill="#C41E3A"/>
  </g>
  <text x="180" y="110" font-family="Montserrat, Arial, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF" letter-spacing="2">COSTA JÚNIOR</text>
  <text x="180" y="138" font-family="Open Sans, Arial, sans-serif" font-size="14" fill="#C8CACE" letter-spacing="3">ENGENHARIA · CONSTRUÇÕES · MANUTENÇÃO</text>
  <!-- Eyebrow -->
  <text x="110" y="220" font-family="Open Sans, Arial, sans-serif" font-size="18" font-weight="600" fill="#C41E3A" letter-spacing="4">MANUTENÇÃO PREDIAL PREVENTIVA</text>
  <!-- Headline (2 lines) -->
  <text x="110" y="305" font-family="Montserrat, Arial, sans-serif" font-size="76" font-weight="800" fill="#FFFFFF">A partir de</text>
  <text x="110" y="395" font-family="Montserrat, Arial, sans-serif" font-size="100" font-weight="900" fill="#FFFFFF">R$ 250<tspan font-size="56" fill="#C8CACE">/mês</tspan></text>
  <!-- Bullets -->
  <g transform="translate(110, 460)">
    <circle cx="10" cy="10" r="10" fill="#C41E3A"/>
    <path d="M5 10 L9 14 L15 7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="16" font-family="Open Sans, Arial, sans-serif" font-size="22" fill="#FFFFFF">+50 lojas atendidas</text>
  </g>
  <g transform="translate(420, 460)">
    <circle cx="10" cy="10" r="10" fill="#C41E3A"/>
    <path d="M5 10 L9 14 L15 7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="16" font-family="Open Sans, Arial, sans-serif" font-size="22" fill="#FFFFFF">Técnico vinculado</text>
  </g>
  <g transform="translate(720, 460)">
    <circle cx="10" cy="10" r="10" fill="#C41E3A"/>
    <path d="M5 10 L9 14 L15 7" stroke="#FFFFFF" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="32" y="16" font-family="Open Sans, Arial, sans-serif" font-size="22" fill="#FFFFFF">Atendimento 24/7</text>
  </g>
  <!-- URL footer -->
  <rect x="0" y="570" width="1200" height="60" fill="#1F2126"/>
  <text x="110" y="608" font-family="Montserrat, Arial, sans-serif" font-size="24" font-weight="700" fill="#FFFFFF">www.costajr.com.br/manutencao</text>
  <text x="950" y="608" font-family="Open Sans, Arial, sans-serif" font-size="18" fill="#C8CACE">São Paulo · SP</text>
</svg>
