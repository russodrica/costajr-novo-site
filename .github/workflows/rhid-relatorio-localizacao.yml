name: RHiD Relatorio de Localizacao (mensal)

# Todo dia 1, gera o relatório de localização (marcações REP-P/app com mapa) do
# MÊS ANTERIOR inteiro e envia para rh@costajr.com.br. O endpoint usa o mês
# anterior por padrão. Brasil = UTC-3 -> 08h BRT = 11h UTC. Minuto 17 reduz fila.
on:
  schedule:
    - cron: "17 11 1 * *" # dia 1, ~08h BRT
  workflow_dispatch:
    inputs:
      mes:
        description: "mês YYYY-MM (vazio = mês anterior)"
        required: false
        default: ""

jobs:
  relatorio:
    runs-on: ubuntu-latest
    steps:
      - name: Gerar e enviar relatorio de localizacao
        env:
          KEY: ${{ secrets.INTEGRA_TELEGRAM_SECRET }}
        run: |
          set -e
          if [ -z "$KEY" ]; then
            echo "ERRO: secret INTEGRA_TELEGRAM_SECRET não configurado."
            exit 1
          fi
          MES="${{ github.event.inputs.mes }}"
          URL="https://www.costajr.com.br/api/integra/rhid-relatorio-localizacao?key=$KEY"
          if [ -n "$MES" ]; then URL="$URL&mes=$MES"; fi
          echo "Gerando relatorio (mes=${MES:-anterior})..."
          code=$(curl -sS -m 300 -L -o resp.json -w "%{http_code}" "$URL")
          echo "HTTP $code"
          cat resp.json || true
          echo
          test "$code" = "200"
